env: dev

http:
  addr: ":8080"

worker:
  health_addr: ":8081"

database:
  dsn: "postgres://soj:soj@postgres:5432/soj?sslmode=disable"

redis:
  addr: "redis:6379"
  stream: "soj:judge:tasks"
  group: "judge-workers"
  stream_max_len: 100000
  dead_stream_max_len: 10000

storage:
  endpoint: "http://minio:9000"
  bucket: "soj"
  region: "us-east-1"
  access_key: "minioadmin"
  secret_key: "minioadmin"
  path_style: true

judge:
  endpoint: "agent://local"
  sandbox_backend: "fake"
  timeout: "30s"
  cleanup_timeout: "5s"
  run_parallelism: 1

auth:
  jwt_secret: "replace-with-env-secret"
  access_token_ttl: "15m"
  refresh_token_ttl: "720h"
