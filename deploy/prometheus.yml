global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - prometheus-rules/soj-alerts.yml

scrape_configs:
  - job_name: soj-api
    metrics_path: /metrics
    static_configs:
      - targets:
          - api:8080

  - job_name: soj-worker
    metrics_path: /metrics
    static_configs:
      - targets:
          - worker:8081

  - job_name: soj-judge-agent
    metrics_path: /metrics
    static_configs:
      - targets:
          - judge-agent:8082
