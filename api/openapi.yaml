    ProblemStatsEnvelope:
      allOf: [{ $ref: "#/components/schemas/Envelope" }]
      properties: { data: { $ref: "#/components/schemas/ProblemStatsResponse" } }
    SubmissionEnvelope:
      allOf: [{ $ref: "#/components/schemas/Envelope" }]
      properties: { data: { $ref: "#/components/schemas/SubmissionResponse" } }
    SubmissionPageEnvelope:
      allOf: [{ $ref: "#/components/schemas/Envelope" }]
