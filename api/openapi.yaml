    ProblemCheckRunEnvelope:
      allOf: [{ $ref: "#/components/schemas/Envelope" }]
      properties: { data: { $ref: "#/components/schemas/ProblemCheckRun" } }
    ProblemAuthoringStateEnvelope:
      allOf: [{ $ref: "#/components/schemas/Envelope" }]
