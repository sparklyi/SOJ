name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Test
        run: go test ./...

      - name: Vet
        run: go vet ./...

      - name: Validate Compose
        run: docker compose -f deploy/docker-compose.yaml config

      - name: Validate Docker runner Compose
        run: COMPOSE_FILE=deploy/docker-compose.yaml:deploy/docker-compose.docker-runner.yaml docker compose config

      - name: Build API image
        run: docker build -f Dockerfile.v2 --build-arg COMMAND=soj-api -t soj-api:ci .

      - name: Build worker image
        run: docker build -f Dockerfile.v2 --build-arg COMMAND=soj-worker -t soj-worker:ci .

      - name: Build judge-agent image
        run: docker build -f Dockerfile.v2 --build-arg COMMAND=soj-judge-agent -t soj-judge-agent:ci .

      - name: Build migrate image
        run: docker build -f Dockerfile.v2 --build-arg COMMAND=soj-migrate -t soj-migrate:ci .

  smoke:
    name: Docker Smoke
    runs-on: ubuntu-latest
    needs: backend
    timeout-minutes: 20
    env:
      COMPOSE_PROJECT_NAME: soj-ci-smoke
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Start smoke stack
        run: |
          docker compose -f deploy/docker-compose.yaml down -v --remove-orphans
          docker compose -f deploy/docker-compose.yaml up --build -d

      - name: Run smoke test
        run: ./deploy/smoke.sh

      - name: Dump smoke logs on failure
        if: failure()
        run: |
          docker compose -f deploy/docker-compose.yaml ps || true
          docker compose -f deploy/docker-compose.yaml logs --no-color api worker judge-agent migrate seed postgres redis minio prometheus || true

      - name: Stop smoke stack
        if: always()
        run: docker compose -f deploy/docker-compose.yaml down -v --remove-orphans || true
